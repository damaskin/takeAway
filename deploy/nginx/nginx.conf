user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  # Gzip — Angular bundles compress ~4x, worth the CPU
  gzip on;
  gzip_vary on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/wasm
    application/xml
    image/svg+xml;

  # WebSocket upgrade helper for the Socket.IO realtime gateway
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # A larger upload cap than nginx's default 1MB so we don't choke on
  # receipts / profile photos uploaded through the API proxy.
  client_max_body_size 25m;

  include /etc/nginx/conf.d/*.conf;
}
