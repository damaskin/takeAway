# Generic Angular SPA serving: long-cache hashed assets, no-cache index.
#
# Expects the including server block to set:
#   $spa_root — filesystem path that contains index.html + assets

# Hashed Angular build assets are content-addressed, cache hard.
location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
  root $spa_root;
  expires 1y;
  add_header Cache-Control "public, immutable";
  try_files $uri =404;
}

# index.html must always round-trip so clients pick up new deploys.
location / {
  root $spa_root;
  add_header Cache-Control "no-cache, no-store, must-revalidate";
  try_files $uri $uri/ /index.html =404;
}
