# Proxies /api/* on any SPA subdomain to the NestJS container.
#
# The web / admin / kds / tma SPAs all use a relative `/api` baseUrl so
# dev (ng serve proxy) and prod can share the same app code. This snippet
# wires that convention on prod nginx.

location /api/ {
  proxy_pass http://api:3000;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;

  # Socket.IO / realtime gateway upgrade path
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  proxy_read_timeout 120s;
  proxy_send_timeout 120s;
}
