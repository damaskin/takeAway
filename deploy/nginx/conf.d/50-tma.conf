server {
  listen 443 ssl;
  http2 on;
  server_name tma.takeaway.million-sales.ru;

  ssl_certificate     /etc/letsencrypt/live/takeaway.million-sales.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/takeaway.million-sales.ru/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  # TMA runs inside Telegram — frameable, so do NOT set X-Frame-Options.
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  include /etc/nginx/snippets/api-proxy.conf;

  set $spa_root /usr/share/nginx/html/tma;
  include /etc/nginx/snippets/spa.conf;
}
