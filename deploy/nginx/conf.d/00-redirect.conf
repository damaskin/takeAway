# Catches all plain HTTP requests for takeaway's subdomains and redirects
# to HTTPS. ACME challenges are still served from the challenge webroot so
# Let's Encrypt renewals keep working without touching this config.

server {
  listen 80;
  server_name takeaway.million-sales.ru
              api.takeaway.million-sales.ru
              admin.takeaway.million-sales.ru
              kds.takeaway.million-sales.ru
              tma.takeaway.million-sales.ru;

  include /etc/nginx/snippets/letsencrypt.conf;

  location / {
    return 301 https://$host$request_uri;
  }
}
