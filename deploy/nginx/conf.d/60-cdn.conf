server {
  listen 443 ssl;
  http2 on;
  server_name cdn.takeaway.million-sales.ru;

  ssl_certificate     /etc/letsencrypt/live/takeaway.million-sales.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/takeaway.million-sales.ru/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Cache-Control "public, max-age=31536000, immutable" always;

  # Proxy everything to MinIO. Objects are served at cdn.../<bucket>/<key>
  # matching MinIO's default path-style routing. Client uploads go through
  # the API — MinIO is only exposed publicly for reads.
  client_max_body_size 10m;

  location / {
    proxy_pass http://minio:9000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # MinIO streams large objects — keep timeouts generous.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;
  }
}
