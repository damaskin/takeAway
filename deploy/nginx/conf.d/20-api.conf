server {
  listen 443 ssl;
  http2 on;
  server_name api.takeaway.million-sales.ru;

  ssl_certificate     /etc/letsencrypt/live/takeaway.million-sales.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/takeaway.million-sales.ru/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Proxy everything to the NestJS API. The app has a global 'api' prefix,
  # so requests hit api.takeaway.../api/... but externally the subdomain
  # itself scopes everything — keep the prefix for continuity with existing
  # frontend base URLs.
  location / {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Socket.IO / realtime gateway upgrade path
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }
}
